version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
        update-types:
          - patch
          - minor

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pip-dependencies:
        patterns:
          - "*"
    ignore:
      # 通常更新はRunPodベースイメージ(runpod/pytorch:2.8.0-cuda12.8.1)と同時に行う。
      # update-typesはsecurity updatesへ適用されないため、脆弱性修正PRは維持される。
      - dependency-name: torch
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major
      - dependency-name: torchaudio
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major
      - dependency-name: funasr
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
