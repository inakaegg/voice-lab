name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  checks: read
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Read Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for required checks
        if: >-
          steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr checks --required --watch --fail-fast "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable squash auto-merge for npm patch/minor updates
        if: >-
          steps.metadata.outputs.package-ecosystem == 'npm_and_yarn' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
