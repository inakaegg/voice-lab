name: Deploy Cloudflare Production

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  current-main:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy: ${{ steps.compare.outputs.deploy }}

    steps:
      - name: Checkout current main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Compare tested revision with current main
        id: compare
        shell: bash
        env:
          TESTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          current_main_sha="$(git rev-parse HEAD)"
          if [[ "${TESTED_SHA}" == "${current_main_sha}" ]]; then
            echo "deploy=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "deploy=false" >> "${GITHUB_OUTPUT}"
          echo "::notice::Skipping stale tested revision ${TESTED_SHA}; current main is ${current_main_sha}."

  deploy:
    needs: current-main
    if: needs.current-main.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout tested revision
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build:web

      - name: Verify Cloudflare credentials
        shell: bash
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::GitHub Secret CLOUDFLARE_API_TOKEN is not configured."
            exit 1
          fi
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "::error::GitHub Secret CLOUDFLARE_ACCOUNT_ID is not configured."
            exit 1
          fi

      - name: Apply production D1 migrations
        run: npx wrangler d1 migrations apply mo-speech-demo-db --remote

      - name: Deploy production Worker
        run: npx wrangler deploy --env=""
