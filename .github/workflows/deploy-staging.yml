name: Deploy Cloudflare Staging

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout selected revision
        uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build:web

      - name: Verify Cloudflare credentials
        shell: bash
        run: |
          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "::error::GitHub Secret CLOUDFLARE_API_TOKEN is not configured."
            exit 1
          fi
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "::error::GitHub Secret CLOUDFLARE_ACCOUNT_ID is not configured."
            exit 1
          fi

      - name: Apply staging D1 migrations
        run: npx wrangler d1 migrations apply mo-speech-staging-db --env staging --remote

      - name: Deploy staging Worker
        run: npx wrangler deploy --env staging
