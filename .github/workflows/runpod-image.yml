name: Build RunPod Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Docker image name"
        required: true
      expected_visibility:
        description: "Existing Docker Hub repository visibility. Public must be selected explicitly."
        required: true
        type: choice
        default: private
        options:
          - private
          - public
      image_tag:
        description: "Docker image tag. Empty uses runpod-<short-sha>."
        required: false
        default: ""
      comfyui_vibevoice_ref:
        description: "ComfyUI-VibeVoice git ref"
        required: true
        default: "99a98031d79e07f279a7aa6d01ce89042e8bba26"
      base_image:
        description: "Docker base image"
        required: true
        default: "runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04"

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free runner disk space
        shell: bash
        run: |
          set -euxo pipefail
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/local/cuda* \
            /opt/ghc \
            /opt/hostedtoolcache
          docker system prune -af || true
          echo "Disk space after cleanup:"
          df -h

      - name: Verify Docker Hub repository visibility
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          INPUT_IMAGE_NAME: ${{ inputs.image_name }}
          INPUT_EXPECTED_VISIBILITY: ${{ inputs.expected_visibility }}
        run: bash scripts/check_dockerhub_visibility.sh "${INPUT_IMAGE_NAME}" "${INPUT_EXPECTED_VISIBILITY}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tag
        id: image
        shell: bash
        env:
          INPUT_IMAGE_NAME: ${{ inputs.image_name }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          tag="${INPUT_IMAGE_TAG}"
          if [[ -z "${tag}" ]]; then
            tag="runpod-${GITHUB_SHA::7}"
          fi
          image="${INPUT_IMAGE_NAME}:${tag}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "Resolved image: ${image}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Build and push RunPod image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.runpod
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.image }}
          build-args: |
            BASE_IMAGE=${{ inputs.base_image }}
            COMFYUI_VIBEVOICE_REF=${{ inputs.comfyui_vibevoice_ref }}
            SOURCE_REVISION=${{ github.sha }}
            IMAGE_TAG=${{ steps.image.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        shell: bash
        env:
          INPUT_BASE_IMAGE: ${{ inputs.base_image }}
          INPUT_EXPECTED_VISIBILITY: ${{ inputs.expected_visibility }}
          RESOLVED_IMAGE: ${{ steps.image.outputs.image }}
        run: |
          {
            echo "## RunPod image"
            echo ""
            echo "- Image: \`${RESOLVED_IMAGE}\`"
            echo "- Repository visibility: \`${INPUT_EXPECTED_VISIBILITY}\`"
            echo "- Dockerfile: \`Dockerfile.runpod\`"
            echo "- Platform: \`linux/amd64\`"
            echo "- Base image: \`${INPUT_BASE_IMAGE}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
