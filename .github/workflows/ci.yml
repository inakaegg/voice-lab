name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: python3 -m pip install -e ".[dev]"

      - name: Install Node dependencies
        run: npm ci

      - name: Python tests
        run: python3 -m pytest

      - name: Worker and browser tests
        run: npm test

      - name: JavaScript syntax checks
        run: npm run check:js

      - name: RunPod Dockerfile is covered by the repository checks
        run: test -f Dockerfile.runpod && test -f .github/workflows/runpod-image.yml
