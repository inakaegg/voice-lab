name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: python3 -m pip install -e ".[dev]"

      - name: Install Node dependencies
        run: npm ci

      - name: Python tests
        run: python3 -m pytest

      - name: Worker and browser tests
        run: npm test

      - name: React typecheck and production build
        run: npm run check:web

      - name: Build wheel and verify bundled web assets
        run: |
          python3 -m pip wheel . --no-deps --wheel-dir tmp/wheel
          python3 scripts/verify_wheel_assets.py tmp/wheel

      - name: JavaScript syntax checks
        run: npm run check:js

      - name: RunPod Dockerfile is covered by the repository checks
        run: test -f Dockerfile.runpod && test -f .github/workflows/runpod-image.yml

  ui-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install application dependencies
        run: |
          python3 -m pip install -e .
          npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Responsive UI layout tests
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-ui-failure
          path: tmp/playwright/
          if-no-files-found: ignore
          retention-days: 7
