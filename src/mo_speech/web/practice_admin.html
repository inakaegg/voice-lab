<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpeakLoop 履歴</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="practice-history-admin" aria-label="SpeakLoop 履歴">
      <header class="practice-history-header">
        <a href="/admin">管理画面</a>
        <a href="/speakloop">SpeakLoop</a>
        <h1>SpeakLoop 履歴</h1>
        <p>通常の音声変換履歴とは分けて、練習用のお手本音声と復唱録音だけを表示します。</p>
      </header>
      <section class="public-access-admin" data-public-access-settings data-public-access-features="speakloop" aria-label="公開制限">
        <div class="public-access-header">
          <div>
            <h2>公開制限</h2>
            <p>Googleログインと、SpeakLoopの使用回数・入力上限を設定します。</p>
          </div>
          <button type="button" class="secondary-button" data-public-access-save>保存</button>
        </div>
        <label class="public-access-toggle">
          <input type="checkbox" data-public-setting="google_login_required" />
          <span>公開生成APIはGoogleログインを必須にする</span>
        </label>
        <label class="public-access-field public-access-wide">
          <span>quota対象外の管理者Googleメール</span>
          <textarea data-public-setting="admin_google_emails" rows="2" placeholder="owner@example.com, admin@example.com"></textarea>
        </label>
        <div class="public-access-feature" data-public-feature="speakloop">
          <h3>SpeakLoop</h3>
          <label>日次回数 <input type="number" min="-1" step="1" data-public-feature-setting="daily_limit" /></label>
          <label>累計回数 <input type="number" min="-1" step="1" data-public-feature-setting="total_limit" /></label>
          <label>録音最大byte <input type="number" min="0" step="1000" data-public-feature-setting="audio_max_bytes" /></label>
          <label>対象文最大文字数 <input type="number" min="0" step="10" data-public-feature-setting="text_max_chars" /></label>
        </div>
        <p class="public-access-note">`-1` は回数制限なし、`0` は管理者以外をブロックします。入力上限超過は回数を消費しません。</p>
        <p class="public-access-status" data-public-access-status role="status" aria-live="polite"></p>
      </section>
      <section class="public-samples-admin" data-public-samples-admin data-public-samples-features="speakloop" aria-label="公開サンプル音声">
        <div class="public-access-header">
          <div>
            <h2>サンプル音声</h2>
            <p>SpeakLoopユーザー画面に表示する出力例を登録します。</p>
          </div>
          <button type="button" class="secondary-button" data-public-samples-save>保存</button>
        </div>
        <div class="public-sample-admin-feature" data-public-sample-admin-feature="speakloop">
          <h3>SpeakLoop</h3>
          <label>タイトル <input type="text" data-public-sample-title maxlength="80" /></label>
          <label class="public-access-wide">説明 <textarea data-public-sample-description rows="2" maxlength="300"></textarea></label>
          <label>音声ファイル <input type="file" accept="audio/*" data-public-sample-file /></label>
          <button type="button" class="secondary-button public-sample-delete-button" data-public-sample-delete>保存済みを削除</button>
          <audio data-public-sample-preview controls preload="metadata" hidden></audio>
          <p class="public-access-note public-sample-details" data-public-sample-details>未設定</p>
        </div>
        <p class="public-access-note">公開ページにそのまま表示されます。権利確認済みの短い音声だけを登録してください。</p>
        <p class="public-access-status" data-public-samples-status role="status" aria-live="polite"></p>
      </section>
      <section class="practice-history-section" aria-label="練習入力">
        <h2>録音</h2>
        <div id="practice-history-recordings" class="practice-history-list"></div>
      </section>
      <section class="practice-history-section" aria-label="お手本音声">
        <h2>お手本音声</h2>
        <div id="practice-history-outputs" class="practice-history-list"></div>
      </section>
      <p id="practice-history-status" class="practice-status" role="status" aria-live="polite">読み込み中です。</p>
    </main>
    <script src="/static/app_public_access_settings.js" defer></script>
    <script src="/static/app_public_sample_audio_admin.js" defer></script>
    <script src="/static/app_practice_history.js" defer></script>
  </body>
</html>
