<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpeakLoop 履歴</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="practice-history-admin" aria-label="SpeakLoop 履歴">
      <header class="practice-history-header">
        <a href="/admin">管理画面</a>
        <a href="/speakloop">SpeakLoop</a>
        <h1>SpeakLoop 履歴</h1>
        <p>通常の音声変換履歴とは分けて、練習用のお手本音声と復唱録音だけを表示します。</p>
      </header>
      <section class="practice-history-section" aria-label="練習入力">
        <h2>録音</h2>
        <div id="practice-history-recordings" class="practice-history-list"></div>
      </section>
      <section class="practice-history-section" aria-label="お手本音声">
        <h2>お手本音声</h2>
        <div id="practice-history-outputs" class="practice-history-list"></div>
      </section>
      <p id="practice-history-status" class="practice-status" role="status" aria-live="polite">読み込み中です。</p>
    </main>
    <script src="/static/app_practice_history.js" defer></script>
  </body>
</html>
