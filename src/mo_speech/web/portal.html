<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Lab</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="portal-body">
    <main class="portal-shell" aria-label="Voice Lab">
      <header class="portal-header">
        <p class="portal-kicker">Voice Lab</p>
        <h1>声でつくる、声で練習する</h1>
      </header>

      <nav class="portal-apps" aria-label="アプリ">
        <a class="portal-app portal-app-skit" href="/skitvoice">
          <span class="portal-app-label">SkitVoice</span>
          <strong>かんたんスキット生成</strong>
          <span>台本と参照音声から、指定した声のセリフ音声を生成します。</span>
        </a>
        <a class="portal-app portal-app-speak" href="/speakloop">
          <span class="portal-app-label">SpeakLoop</span>
          <strong>言いたいことを話す練習</strong>
          <span>母国語で話し、模範音声を聞いて、学習対象言語で復唱します。</span>
        </a>
      </nav>
    </main>
  </body>
</html>
