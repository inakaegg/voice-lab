<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>へんなへんかん | Voice Lab</title>
    <link rel="stylesheet" href="/react/assets/app.css" />
  </head>
  <body class="user-body voice-lab-utility-body">
    <main class="user-stage" aria-label="へんなへんかんアプリ">
      <a class="utility-brand" href="/" aria-label="Voice Labへ戻る">Voice Lab</a>
      <input id="target_language" name="target_language" type="hidden" value="user-auto" />
      <input id="similar_voice" type="checkbox" checked hidden />
      <button id="display-mode-button" class="display-mode-button" type="button">🇯🇵 ひらがな</button>

      <section class="public-sample-audio user-sample-audio" data-public-sample-feature="fun" hidden aria-label="へんなへんかん サンプル音声">
        <div>
          <p class="public-sample-kicker">Sample</p>
          <h2 data-public-sample-title>サンプル音声</h2>
          <p data-public-sample-description hidden></p>
        </div>
        <audio data-public-sample-audio controls preload="metadata"></audio>
      </section>

      <section class="user-hero" aria-label="ろくおん">
        <p id="user-language-label" class="user-kicker">へんな へんかん アプリ</p>
        <span id="user-warmup-status" class="user-warmup-status" hidden aria-label="RunPod準備状態"></span>
        <h1 id="speak-heading">はなしてください</h1>
        <button id="user-record-button" class="record-orb" type="button" aria-label="ろくおん">
          <span class="record-progress" aria-hidden="true"></span>
          <span class="record-waves" aria-hidden="true"></span>
          <span class="record-icon" aria-hidden="true"></span>
          <span id="record-level-meter" class="record-level-meter" aria-hidden="true">
            <span class="record-level-bar"></span>
            <span class="record-level-bar"></span>
            <span class="record-level-bar"></span>
            <span class="record-level-bar"></span>
            <span class="record-level-bar"></span>
            <span class="record-level-bar"></span>
            <span class="record-level-bar"></span>
            <span class="record-level-bar"></span>
            <span class="record-level-bar"></span>
          </span>
          <span id="record-timer" class="record-timer" aria-hidden="true">5</span>
        </button>
        <p id="user-status" class="user-status" role="status" aria-live="polite">
          おして はなす
        </p>
        <div id="user-output-texts" class="user-output-texts" hidden>
          <article id="user-output-text-card" class="user-output-text-card">
            <h2 id="user-output-text-mode">ひらがな</h2>
            <p id="user-output-text" class="user-output-text"></p>
          </article>
        </div>
        <div id="user-processing-panel" class="user-processing-panel" hidden>
          <div class="user-processing-bar" aria-hidden="true">
            <span id="user-processing-fill" class="user-processing-fill"></span>
          </div>
        </div>
        <p id="user-minimum-hint" class="user-minimum-hint" hidden>
          5びょう いじょう はなしてください
        </p>
      </section>

      <section class="user-toggles" aria-label="せってい">
        <label class="toggle-tile">
          <input id="joke_mode" type="checkbox" />
          <span class="toggle-icon" aria-hidden="true">😊</span>
          <span id="joke-mode-label">ジョーク</span>
        </label>
        <label class="toggle-tile" hidden>
          <input id="osaka_dialect" type="checkbox" />
          <span class="toggle-icon" aria-hidden="true">🏯</span>
          <span id="osaka-dialect-label">おおさかべん</span>
        </label>
        <label class="toggle-tile" hidden>
          <input id="variation_mode" type="checkbox" />
          <span class="toggle-icon" aria-hidden="true">✨</span>
          <span id="variation-mode-label">バリエーション</span>
        </label>
      </section>

      <section class="user-output" aria-label="できたこえ">
        <button id="user-replay-button" class="replay-button" type="button" hidden>
          <span class="replay-icon" aria-hidden="true"></span>
          <span id="user-replay-label">もういちど</span>
        </button>
        <audio id="user-output-audio" hidden></audio>
        <p id="user-error" class="user-error" hidden></p>
      </section>
    </main>
    <script src="/static/app_public_sample_audio.js" defer></script>
    <script src="/static/app_user.js" defer></script>
  </body>
</html>
