<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpeakLoop - 言いたいことで発音練習</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="practice-body">
    <main class="practice-shell" aria-label="SpeakLoop">
      <header class="practice-header">
        <div class="practice-header-main">
          <a class="practice-back-link" href="/" aria-label="Voice Labへ">←</a>
          <div>
            <p class="practice-kicker">SpeakLoop</p>
            <h1>言いたいことで発音練習</h1>
          </div>
        </div>
        <section class="public-auth-panel practice-header-auth" data-public-auth-panel hidden aria-label="公開デモのログイン状態">
          <span data-public-auth-status>ログイン状態を確認中です。</span>
          <a data-public-auth-login href="/auth/google/login?next=/speakloop">Googleでログイン</a>
          <a data-public-auth-logout href="/auth/logout" hidden>ログアウト</a>
        </section>
      </header>

      <div class="public-status-bar">
        <section class="public-sample-audio" data-public-sample-feature="speakloop" hidden aria-label="SpeakLoop サンプル音声">
          <div>
            <p class="public-sample-kicker">Sample</p>
            <h2 data-public-sample-title>サンプル音声</h2>
            <p data-public-sample-description hidden></p>
          </div>
          <audio data-public-sample-audio controls preload="metadata"></audio>
        </section>
        <p class="public-privacy-notice" data-public-privacy-notice>
          音声は外部の音声処理APIへ送信され、公開デモでは設定に応じて短い音声履歴を保存する場合があります。機密情報を含む音声は入力しないでください。
        </p>
      </div>

      <section class="practice-quick-settings" aria-label="練習設定">
        <label class="practice-current-language practice-language-select">
          <span>学習言語</span>
          <select id="practice-target-language-select" aria-label="学習する言語">
            <option value="ja-JP">🇯🇵 日本語</option>
            <option value="zh-CN">🇨🇳 中文</option>
            <option value="en-US">🇺🇸 English</option>
          </select>
        </label>
        <label id="practice-pinyin-setting" class="practice-inline-setting" hidden>
          <input id="practice-pinyin-toggle" type="checkbox" checked />
          <span>ピンイン</span>
        </label>
      </section>

      <section class="practice-flow" aria-label="れんしゅう">
        <article id="practice-native-panel" class="practice-card practice-card-primary" data-practice-record-slot="native">
          <div class="practice-step-number">1</div>
          <div class="practice-card-copy">
            <h2 id="practice-record-title">言いたいことを話す</h2>
          </div>
          <button id="practice-native-record-button" class="record-orb practice-record-orb" type="button" aria-label="言いたいことを録音">
            <span class="record-progress" aria-hidden="true"></span>
            <span class="record-waves" aria-hidden="true"></span>
            <span class="record-icon" aria-hidden="true"></span>
            <span id="practice-native-level" class="record-level-meter" aria-hidden="true">
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
            </span>
            <span class="record-timer" aria-hidden="true">REC</span>
          </button>
          <div id="practice-native-transcript-panel" class="practice-native-transcript-panel" hidden>
            <p id="practice-native-transcript-label" class="practice-mini-label">言ったこと</p>
            <p id="practice-native-transcript" class="practice-native-transcript"></p>
          </div>
        </article>

        <article id="practice-prompt-panel" class="practice-card practice-prompt-card" data-practice-record-slot="repeat" hidden>
          <div class="practice-step-number">2</div>
          <div class="practice-card-copy">
            <h2>練習</h2>
            <p id="practice-target-label">お手本</p>
          </div>
          <div class="practice-target-practice-row">
            <div class="practice-target-text-box">
              <p id="practice-target-text" class="practice-target-text"></p>
              <p id="practice-target-subtext" class="practice-target-subtext" hidden></p>
            </div>
            <button id="practice-repeat-record-button" class="record-orb practice-record-orb practice-repeat-record-button" type="button" aria-label="練習を録音">
              <span class="record-progress" aria-hidden="true"></span>
              <span class="record-waves" aria-hidden="true"></span>
              <span class="record-icon" aria-hidden="true"></span>
              <span id="practice-repeat-level" class="record-level-meter" aria-hidden="true">
                <span class="record-level-bar"></span>
                <span class="record-level-bar"></span>
                <span class="record-level-bar"></span>
                <span class="record-level-bar"></span>
                <span class="record-level-bar"></span>
                <span class="record-level-bar"></span>
                <span class="record-level-bar"></span>
              </span>
              <span class="record-timer" aria-hidden="true">REC</span>
            </button>
          </div>
          <div id="practice-result-panel" class="practice-result-inline" hidden>
            <p id="practice-recognized-label" class="practice-section-label">聞こえた言葉</p>
            <p id="practice-recognized-text" class="practice-recognized-text"></p>
            <div class="practice-result-summary">
              <div id="practice-grade-badge" class="practice-grade-badge">--</div>
              <p id="practice-score" class="practice-score"></p>
            </div>
            <div class="practice-score-bar" aria-hidden="true">
              <span id="practice-score-fill"></span>
            </div>
            <audio id="practice-repeat-audio" hidden></audio>
          </div>
          <div class="practice-model-controls">
            <button id="practice-play-model-button" class="practice-play-button" type="button">
              <span aria-hidden="true">▶</span>
              <span>再生</span>
            </button>
            <label class="practice-auto-play-control">
              <input id="practice-auto-play-comparison" type="checkbox" checked />
              <span>練習終了後すぐ再生</span>
            </label>
            <label class="practice-speed-control">
              <span>速度</span>
              <input id="practice-speed-slider" type="range" min="0.5" max="2" step="0.1" value="1" />
              <output id="practice-speed-value" for="practice-speed-slider">1.0x</output>
            </label>
          </div>
          <p class="practice-grade-guide">判定: 99.5%以上: できました / 95%以上: いいかんじ / 90%以上: まあまあ / 90%未満: もう一回</p>
          <audio id="practice-model-audio" hidden></audio>
        </article>
      </section>

      <div id="practice-progress" class="practice-progress" hidden>
        <span id="practice-progress-fill"></span>
      </div>
      <p id="practice-status" class="practice-status" role="status" aria-live="polite" hidden></p>
      <p id="practice-error" class="practice-error" hidden></p>
    </main>
    <script src="/static/app_public_session.js" defer></script>
    <script src="/static/app_public_sample_audio.js" defer></script>
    <script src="/static/app_practice.js" defer></script>
  </body>
</html>
