<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpeakLoop - 言いたいことを話す練習</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="practice-body">
    <main class="practice-shell" aria-label="SpeakLoop">
      <header class="practice-header">
        <a class="practice-back-link" href="/" aria-label="Voice Labへ">←</a>
        <div>
          <p class="practice-kicker">SpeakLoop</p>
          <h1>言いたいことを話す練習 <span>Pronunciation Practice</span> <span>发音练习</span></h1>
        </div>
      </header>

      <section class="practice-target-panel" aria-label="れんしゅうすることば">
        <p class="practice-section-label">学習する言語 / Learning language / 学习语言</p>
        <div id="practice-target-language" class="practice-language-grid" role="radiogroup" aria-label="学習対象言語">
          <button type="button" class="practice-language-button is-selected" data-language="ja-JP" value="ja-JP" role="radio" aria-checked="true">
            <span aria-hidden="true">🇯🇵</span>
            <strong>日本語</strong>
          </button>
          <button type="button" class="practice-language-button" data-language="zh-CN" value="zh-CN" role="radio" aria-checked="false">
            <span aria-hidden="true">🇨🇳</span>
            <strong>中文</strong>
          </button>
          <button type="button" class="practice-language-button" data-language="en-US" value="en-US" role="radio" aria-checked="false">
            <span aria-hidden="true">🇺🇸</span>
            <strong>English</strong>
          </button>
        </div>
        <label id="practice-pinyin-setting" class="practice-inline-setting" hidden>
          <input id="practice-pinyin-toggle" type="checkbox" checked />
          <span>ピンインを表示 / Show pinyin / 显示拼音</span>
        </label>
        <label class="practice-inline-setting">
          <span>ASR</span>
          <select id="practice-asr-model">
            <option value="gpt-4o-transcribe" selected>gpt-4o</option>
            <option value="gpt-4o-mini-transcribe">gpt-4o mini</option>
            <option value="whisper-1">whisper-1</option>
          </select>
        </label>
      </section>

      <section class="practice-flow" aria-label="れんしゅう">
        <article class="practice-card practice-card-primary">
          <div class="practice-step-number">1</div>
          <div class="practice-card-copy">
            <h2 id="practice-record-title">言いたいことを話す</h2>
            <p id="practice-record-description">说出想说的话 / Say what you want</p>
          </div>
          <button id="practice-native-record-button" class="record-orb practice-record-orb" type="button" aria-label="言いたいことを録音">
            <span class="record-progress" aria-hidden="true"></span>
            <span class="record-waves" aria-hidden="true"></span>
            <span class="record-icon" aria-hidden="true"></span>
            <span id="practice-native-level" class="record-level-meter" aria-hidden="true">
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
              <span class="record-level-bar"></span>
            </span>
            <span class="record-timer" aria-hidden="true">REC</span>
          </button>
          <p id="practice-native-action-label" class="practice-orb-caption">話す / Speak / 说</p>
        </article>

        <article id="practice-prompt-panel" class="practice-card practice-prompt-card" hidden>
          <div class="practice-step-number">2</div>
          <div class="practice-card-copy">
            <h2>お手本</h2>
            <p id="practice-target-label">Listen and repeat / 听一听，然后模仿</p>
          </div>
          <div id="practice-native-transcript-panel" class="practice-native-transcript-panel" hidden>
            <p id="practice-native-transcript-label" class="practice-mini-label">言ったこと</p>
            <p id="practice-native-transcript" class="practice-native-transcript"></p>
          </div>
          <div class="practice-target-text-box">
            <p id="practice-target-text" class="practice-target-text"></p>
            <p id="practice-target-subtext" class="practice-target-subtext" hidden></p>
          </div>
          <div id="practice-result-panel" class="practice-result-inline" hidden>
            <p id="practice-recognized-label" class="practice-section-label">聞こえた言葉</p>
            <p id="practice-recognized-text" class="practice-recognized-text"></p>
            <div class="practice-result-summary">
              <div id="practice-grade-badge" class="practice-grade-badge">--</div>
              <p id="practice-score" class="practice-score"></p>
            </div>
            <div class="practice-score-bar" aria-hidden="true">
              <span id="practice-score-fill"></span>
            </div>
            <audio id="practice-repeat-audio" hidden></audio>
          </div>
          <div class="practice-model-controls">
            <button id="practice-play-model-button" class="practice-play-button" type="button">
              <span aria-hidden="true">▶</span>
              <span>再生</span>
            </button>
            <label class="practice-speed-control">
              <span>速度</span>
              <input id="practice-speed-slider" type="range" min="0.25" max="2" step="0.25" value="1" />
              <output id="practice-speed-value" for="practice-speed-slider">1.0x</output>
            </label>
            <label class="practice-speed-control">
              <span>分割</span>
              <select id="practice-segment-mode">
                <option value="punctuation" selected>句読点</option>
                <option value="sentence">句点</option>
              </select>
            </label>
            <button id="practice-next-prompt-button" class="practice-next-prompt-button" type="button" hidden>次の文</button>
          </div>
          <audio id="practice-model-audio" hidden></audio>
        </article>
      </section>

      <div id="practice-progress" class="practice-progress" hidden>
        <span id="practice-progress-fill"></span>
      </div>
      <p id="practice-status" class="practice-status" role="status" aria-live="polite">言いたいことを話す / 说出想说的话 / Say what you want</p>
      <p id="practice-error" class="practice-error" hidden></p>
    </main>
    <script src="/static/app_practice.js" defer></script>
  </body>
</html>
